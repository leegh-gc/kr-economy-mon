spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:leeghhome.iptime.org}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aptprice_data}
    username: ${POSTGRES_USER:}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 10000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

app:
  ecos:
    api-key: ${ECOS_API_KEY:}
    base-url: https://ecos.bok.or.kr/api
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-3-flash
    timeout-seconds: 30
    text-api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    image-api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent
  admin-key: ${ADMIN_KEY:}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
