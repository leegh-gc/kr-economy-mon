<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="economy-tab">

    <div class="row g-3">

        <!-- 섹션1: 금리 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">금리</h6>
                    <small class="text-muted">기준금리 · 국고채 3년 · 국고채 10년</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="interestRateChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션2a: GDP 성장률 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">GDP 성장률</h6>
                    <small class="text-muted">전기 대비 성장률 (%)</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="gdpChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션2b: 1인당 국민소득 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">1인당 국민소득</h6>
                    <small class="text-muted">1인당 GDP (달러)</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="gdpIncomeChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션3: 환율 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">환율</h6>
                    <small class="text-muted">USD · JPY(100엔)</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="exchangeRateChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션4: 물가 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">물가</h6>
                    <small class="text-muted">CPI · PPI</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="priceIndexChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션5: 무역/경상수지 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">무역 / 경상수지</h6>
                    <small class="text-muted">경상수지 · 수출 · 수입</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="tradeChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션6: 고용/경기 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">고용 / 경기</h6>
                    <small class="text-muted">실업률 · 취업자수</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="employmentChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션7a: 통화량 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">통화량 (M2)</h6>
                    <small class="text-muted">광의통화 M2 (조원)</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="liquidityChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션7b: 외환보유액 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">외환보유액</h6>
                    <small class="text-muted">한국 (억달러)</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="forexReserveChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- 섹션8: 인구/출산율/고령화 -->
        <div class="col-12 col-lg-6 section-card">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-bold">인구 / 출산율 / 고령화</h6>
                    <small class="text-muted">총인구 · 고령인구비율 · 합계출산율</small>
                </div>
                <div class="card-body p-2">
                    <div class="chart-wrapper"><canvas id="populationChart"></canvas></div>
                </div>
            </div>
        </div>

    </div><!-- .row -->

    <!-- Gemini 경제 분석 영역 -->
    <div class="analysis-section mt-4" id="economy-analysis">
        <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="fw-bold mb-0">AI 경제 분석</h6>
            <button id="btn-economy-refresh" class="btn btn-outline-secondary btn-sm"
                    title="AI 분석 새로고침">
                <i class="bi bi-arrow-clockwise me-1"></i>새로고침
            </button>
        </div>
        <div id="economy-analysis-text" class="text-muted">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status">
                <span class="visually-hidden">분석 중...</span>
            </div>
            경제 데이터 로딩 후 AI 분석이 표시됩니다.
        </div>
    </div>

</div><!-- th:fragment -->
</body>
</html>
