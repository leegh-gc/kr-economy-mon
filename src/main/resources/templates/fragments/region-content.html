<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="region-content(regionId, regionName, districtNames)">

    <div class="row g-3">
        <!-- 매매가 차트 -->
        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0 fw-bold">
                        <span th:text="${regionName}">권역</span> 평균매매가 추이
                    </h6>
                    <small class="text-muted" th:text="${districtNames}">구 목록</small>
                </div>
                <div class="card-body p-2">
                    <div th:id="'chart-trade-' + ${regionId}" class="chart-placeholder">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">로딩 중...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 전세가 차트 -->
        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0 fw-bold">
                        <span th:text="${regionName}">권역</span> 평균전세가 추이
                    </h6>
                    <small class="text-muted" th:text="${districtNames}">구 목록</small>
                </div>
                <div class="card-body p-2">
                    <div th:id="'chart-lease-' + ${regionId}" class="chart-placeholder">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">로딩 중...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOP5 테이블 -->
    <div class="row g-3 mt-1">
        <!-- 매매 TOP5 -->
        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0 fw-bold">올해 평균매매가 TOP 10</h6>
                </div>
                <div class="card-body p-2">
                    <div th:id="'table-top5-trade-' + ${regionId}" class="text-muted text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">로딩 중...</span>
                        </div>
                        데이터 로딩 중...
                    </div>
                </div>
            </div>
        </div>

        <!-- 전세 TOP5 -->
        <div class="col-12 col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0 fw-bold">올해 평균전세가 TOP 10</h6>
                </div>
                <div class="card-body p-2">
                    <div th:id="'table-top5-lease-' + ${regionId}" class="text-muted text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">로딩 중...</span>
                        </div>
                        데이터 로딩 중...
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
